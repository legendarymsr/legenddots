name: Build IceCat APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'icecat-mobile/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk \
            /opt/ghc /opt/hostedtoolcache/CodeQL "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('icecat-mobile/src/**/*.gradle*', 'icecat-mobile/src/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build IceCat APK
        working-directory: icecat-mobile
        run: ./scripts/build.sh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: icecat-apk
          path: icecat-mobile/dist/*.apk
