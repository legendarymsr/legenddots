name: Build IceCat APK

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'icecat-mobile/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build-tools (zipalign, apksigner)
        run: |
          sdkmanager "build-tools;34.0.0"
          echo "$ANDROID_HOME/build-tools/34.0.0" >> "$GITHUB_PATH"

      - name: Install apktool
        run: |
          APKTOOL_VERSION=$(curl -fsSL https://api.github.com/repos/iBotPeaches/Apktool/releases/latest | jq -r .tag_name | sed 's/^v//')
          sudo curl -fL -o /usr/local/bin/apktool.jar \
            "https://github.com/iBotPeaches/Apktool/releases/download/v${APKTOOL_VERSION}/apktool_${APKTOOL_VERSION}.jar"
          printf '#!/usr/bin/env bash\nexec java -jar /usr/local/bin/apktool.jar "$@"\n' | sudo tee /usr/local/bin/apktool >/dev/null
          sudo chmod +x /usr/local/bin/apktool

      - name: Build IceCat APK
        working-directory: icecat-mobile
        run: ./scripts/package.sh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: icecat-apk
          path: icecat-mobile/dist/icecat.apk
