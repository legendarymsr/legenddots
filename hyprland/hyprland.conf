# ── Monitors ─────────────────────────────────────────────────────────────────────────────
monitor=,preferred,auto,1

# ── Startup ─────────────────────────────────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = sleep 1 && waybar
exec-once = dunst
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# ── Environment ───────────────────────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ── Input ───────────────────────────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0.2
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

# ── General ─────────────────────────────────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(7aa2f7ff) rgba(bb9af7ff) 45deg
    col.inactive_border = rgba(414868ff)
    layout = dwindle
    resize_on_border = true
}

# ── Decoration ────────────────────────────────────────────────────────────────────────────
decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000066)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        xray = false
    }
}

# ── Animations ────────────────────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = easeOut,   0.16, 1, 0.3, 1
    bezier = easeInOut, 0.87, 0, 0.13, 1
    bezier = linear,    0,    0, 1,    1

    animation = windows,     1, 4,  easeOut,   slide
    animation = windowsOut,  1, 4,  easeOut,   slide
    animation = border,      1, 6,  linear
    animation = fade,        1, 4,  easeInOut
    animation = workspaces,  1, 5,  easeInOut, slidevert
}

# ── Layouts ─────────────────────────────────────────────────────────────────────────────
dwindle {
    preserve_split = true
}

# ── Misc ───────────────────────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# ── Window Rules ───────────────────────────────────────────────────────────────────────────
windowrule = opacity 0.95 0.90, match:class ^(Alacritty)$
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:title ^(Picture-in-Picture)$

# ── Keybinds ────────────────────────────────────────────────────────────────────────────
$mod = SUPER

bind = $mod, Return,      exec, alacritty
bind = $mod, D,           exec, fuzzel
bind = $mod, B,           exec, brave-origin-nightly
bind = $mod SHIFT, Q,     killactive
bind = $mod SHIFT, E,     exit
bind = $mod, Tab,         cyclenext
bind = $mod, Escape,      exec, hyprlock
bind = $mod, F,           fullscreen, 0
bind = $mod SHIFT, Space, togglefloating
bind = $mod, P,           pseudo
bind = $mod, T,           layoutmsg, togglesplit

bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

bind = $mod CTRL, H, resizeactive, -40 0
bind = $mod CTRL, L, resizeactive,  40 0
bind = $mod CTRL, K, resizeactive,  0 -40
bind = $mod CTRL, J, resizeactive,  0  40

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

bind = , Print,       exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print,  exec, grim - | wl-copy
