[colors]
bg      = #1a1b26
fg      = #c0caf5
blue    = #7aa2f7
purple  = #bb9af7
green   = #9ece6a
yellow  = #e0af68
red     = #f7768e
cyan    = #7dcfff
dim     = #414868
muted   = #a9b1d6

[bar/main]
width = 100%
height = 32
radius = 0
fixed-center = true

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 2
padding-left = 1
padding-right = 1
module-margin = 1

font-0 = JetBrainsMono Nerd Font:size=11:weight=bold;2
font-1 = JetBrainsMono Nerd Font:size=14;3

modules-left = i3 xwindow
modules-center = date
modules-right = pulseaudio cpu memory network battery

separator =
separator-foreground = ${colors.dim}

tray-position = right
tray-padding = 4
tray-background = ${colors.bg}

cursor-click = pointer

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false

label-focused = %index%
label-focused-foreground = ${colors.blue}
label-focused-background = ${colors.bg}
label-focused-underline = ${colors.blue}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.dim}
label-unfocused-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.muted}
label-visible-padding = 2

label-urgent = %index%
label-urgent-foreground = ${colors.red}
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.muted}

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d
time = %H:%M
label =  %time%   %date%
label-foreground = ${colors.purple}
label-font = 1

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.purple}
label-muted =  muted
label-muted-foreground = ${colors.dim}
ramp-volume-0 =
ramp-volume-1 =
ramp-volume-2 =
ramp-volume-foreground = ${colors.purple}
click-right = pavucontrol

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.cyan}
label = %percentage%%
label-foreground = ${colors.cyan}

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.green}
label = %percentage_used%%
label-foreground = ${colors.green}

[module/network]
type = internal/network
interface-type = wireless
interval = 3
format-connected = <label-connected>
label-connected =  %essid%
label-connected-foreground = ${colors.blue}
label-disconnected = 󰖪
label-disconnected-foreground = ${colors.dim}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 99
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full-prefix = " "
format-full-prefix-foreground = ${colors.green}

label-charging = %percentage%%
label-charging-foreground = ${colors.yellow}
label-discharging = %percentage%%
label-discharging-foreground = ${colors.green}

ramp-capacity-0 =
ramp-capacity-1 =
ramp-capacity-2 =
ramp-capacity-3 =
ramp-capacity-4 =
ramp-capacity-foreground = ${colors.green}

animation-charging-0 =
animation-charging-1 =
animation-charging-2 =
animation-charging-3 =
animation-charging-4 =
animation-charging-foreground = ${colors.yellow}
animation-charging-framerate = 750
