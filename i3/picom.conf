backend = "glx";
vsync = true;
glx-no-stencil = true;

# ── Shadows ───────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.4;
shadow-exclude = [
    "class_g = 'i3-frame'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ── Fading ────────────────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.06;
fade-out-step = 0.06;
fade-delta = 4;

# ── Transparency ──────────────────────────────────────────────────────────────
inactive-opacity = 0.92;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "95:class_g = 'Alacritty'"
];

# ── Blur ─────────────────────────────────────────────────────────────────────
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ── Corners ───────────────────────────────────────────────────────────────────
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'"
];
