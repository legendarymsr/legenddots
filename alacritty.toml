[window]
# 95% tactical transparency as per your manifesto
opacity = 0.95
# Use 'None' to save CPU/GPU cycles on drawing borders
decorations = "None"
startup_mode = "Maximized"

[font]
# Since you're a Gentoo snob, ensure this matches your system-compiled font
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
size = 11.0

[cursor]
# Using a block cursor is the only way to live
style = "Block"
unfocused_hollow = true