[main]
font=JetBrainsMono Nerd Font:size=13
dpi-aware=yes
width=35
lines=10
terminal=alacritty -e
layer=overlay
exit-on-keyboard-focus-loss=yes

[colors]
background=1a1b26f2
text=c0caf5ff
match=7aa2f7ff
selection=7aa2f71a
selection-text=c0caf5ff
selection-match=7dcfffff
border=7aa2f740

[border]
width=2
radius=8

[dmenu]
exit-immediately-if-empty=yes
